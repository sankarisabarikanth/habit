<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AuraHabit - Modern Glassmorphic Habit Tracker{% endblock %}</title>
    <!-- Outfit & Inter Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Premium CSS stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Premium Ambient Lighting Background Effects -->
    <div class="ambient-glow purple-glow"></div>
    <div class="ambient-glow blue-glow"></div>
    <div class="ambient-glow pink-glow"></div>

    <div class="app-wrapper">
        <!-- Dashboard Premium Header -->
        <header class="app-navbar">
            <div class="brand">
                <span class="brand-logo">✨</span>
                <div class="brand-text">
                    <h1 class="brand-name">AuraHabit</h1>
                    <p class="brand-tagline">Achieve consistency. Build streaks.</p>
                </div>
            </div>
            <nav class="nav-controls">
                <button class="btn btn-sm btn-glass" id="btn-export-data">
                    <i data-lucide="download"></i> Export Data
                </button>
                <div class="date-selector">
                    <span class="date-label">Real Time:</span>
                    <span id="current-date-display" style="font-size: 0.85rem; font-weight: 600; color: var(--text-primary);"></span>
                </div>
            </nav>
        </header>

        <!-- Main Dashboard Layout -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>&copy; 2026 AuraHabit Backend API. All systems operational. Designed for peak cognitive performance.</p>
        </footer>
    </div>

    <!-- Toast Notification System -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        // Global Toast System helper
        function showToast(message, type = "success") {
            const container = document.getElementById("toast-container");
            if (!container) return;

            const toast = document.createElement("div");
            toast.className = `toast ${type}`;

            let icon = "check-circle";
            if (type === "error" || type === "danger") icon = "alert-circle";
            else if (type === "warning") icon = "help-circle";
            else if (type === "info") icon = "info";

            toast.innerHTML = `
                <i class="toast-icon" data-lucide="${icon}"></i>
                <div class="toast-message">${message}</div>
            `;

            container.appendChild(toast);
            lucide.createIcons();

            // Animate In
            setTimeout(() => toast.classList.add("show"), 10);

            // Auto Remove
            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // Initialize icons
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            
            // Set current date display and clear sandbox date
            const dateDisplay = document.getElementById("current-date-display");
            if (dateDisplay) {
                const today = new Date();
                
                // Format date nicely (e.g. "Jun 11, 2026")
                const options = { year: 'numeric', month: 'short', day: 'numeric' };
                dateDisplay.textContent = today.toLocaleDateString('en-US', options);
                
                // Remove sandbox_date from localStorage to enforce real time
                localStorage.removeItem("sandbox_date");
            }

            // Export habits logic
            const btnExport = document.getElementById("btn-export-data");
            if (btnExport) {
                btnExport.addEventListener("click", () => {
                    const today = new Date();
                    const localStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
                    window.location.href = `/api/habits/export?date=${localStr}`;
                });
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
